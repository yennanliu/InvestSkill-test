name: Stock Evaluation — Gemini (InvestSkill)

# Stock valuation using InvestSkill installed in Gemini runtime:
#   Install:  git clone yennanliu/InvestSkill  (GEMINI.md auto-loaded as context)
#   Prompt:   prompts/stock-valuation.md       (@prompts/stock-valuation.md)
#   Data:     live yfinance
#   AI:       Google Gemini API  (secret: GEMINI_API_KEY)
#
# Output: output/stock_eval/<ticker>/stock_eval_YYYY-MM-DD_<model>.md

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Stock ticker symbol (e.g. AAPL, TSLA, NVDA)"
        required: true
        default: "AAPL"
      model:
        description: "Gemini model"
        required: false
        default: "gemini-2.0-flash"
        type: choice
        options:
          - gemini-2.0-flash
          - gemini-1.5-pro
          - gemini-1.5-flash
      max_tokens:
        description: "Max output tokens"
        required: false
        default: "8192"

  schedule:
    # Runs every weekday at 07:05 UTC (offset from OpenAI jobs).
    # Edit DEFAULT_TICKER below to change the scheduled ticker.
    - cron: "5 7 * * 1-5"

permissions:
  contents: write

concurrency:
  group: "stock-eval-gemini-${{ github.run_id }}"
  cancel-in-progress: false

jobs:
  stock-eval-gemini:
    name: Stock Eval — Gemini
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout this repo ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Install InvestSkill — clone so GEMINI.md + prompts/ are available
      #       Mirrors: cd /path/to/InvestSkill && gemini  (auto-loads GEMINI.md)
      - name: Install InvestSkill skill repo
        run: |
          git clone --depth 1 https://github.com/yennanliu/InvestSkill.git InvestSkill
          echo "✅ InvestSkill installed"
          echo ""
          echo "=== GEMINI.md (system context, auto-loaded by gemini CLI) ==="
          head -20 InvestSkill/GEMINI.md
          echo ""
          echo "=== Prompt: prompts/stock-valuation.md ==="
          cat InvestSkill/prompts/stock-valuation.md

      # ── 3. Python ──────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 4. Install Python dependencies ────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install google-generativeai>=0.8.0 yfinance>=0.2.40

      # ── 5. Resolve parameters ──────────────────────────────────────────────
      - name: Resolve parameters
        id: params
        run: |
          DEFAULT_TICKER="AAPL"
          DEFAULT_MODEL="gemini-2.0-flash"
          DEFAULT_MAX_TOKENS="8192"

          TICKER="${{ github.event.inputs.ticker }}"
          MODEL="${{ github.event.inputs.model }}"
          MAX_TOKENS="${{ github.event.inputs.max_tokens }}"

          TICKER="${TICKER:-$DEFAULT_TICKER}"
          MODEL="${MODEL:-$DEFAULT_MODEL}"
          MAX_TOKENS="${MAX_TOKENS:-$DEFAULT_MAX_TOKENS}"

          TICKER_UPPER=$(echo "$TICKER" | tr '[:lower:]' '[:upper:]')
          TICKER_LOWER=$(echo "$TICKER" | tr '[:upper:]' '[:lower:]')
          OUTPUT_DIR="output/stock_eval/${TICKER_LOWER}"

          echo "ticker=${TICKER_UPPER}"     >> "$GITHUB_OUTPUT"
          echo "model=${MODEL}"             >> "$GITHUB_OUTPUT"
          echo "max_tokens=${MAX_TOKENS}"   >> "$GITHUB_OUTPUT"
          echo "output_dir=${OUTPUT_DIR}"   >> "$GITHUB_OUTPUT"

          echo "=== Parameters ==="
          echo "  Ticker:     ${TICKER_UPPER}"
          echo "  Model:      ${MODEL}"
          echo "  Max tokens: ${MAX_TOKENS}"
          echo "  Output dir: ${OUTPUT_DIR}"

      # ── 6. Verify API key ──────────────────────────────────────────────────
      - name: Check GEMINI_API_KEY secret
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::GEMINI_API_KEY secret is not set."
            echo "Add it under: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "✅ GEMINI_API_KEY is set."

      # ── 7. Generate report ─────────────────────────────────────────────────
      - name: Generate stock evaluation report (Gemini)
        timeout-minutes: 15
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/stock_eval_gemini.py \
            "${{ steps.params.outputs.ticker }}" \
            --model            "${{ steps.params.outputs.model }}" \
            --max-tokens       "${{ steps.params.outputs.max_tokens }}" \
            --output-dir       "${{ steps.params.outputs.output_dir }}" \
            --invest-skill-dir "InvestSkill"

      # ── 8. Commit & push report ────────────────────────────────────────────
      - name: Commit and push report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "📥 Pulling latest changes..."
          git pull --rebase origin main

          git add "${{ steps.params.outputs.output_dir }}/"

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE=$(date -u +"%Y-%m-%d")
            TICKER="${{ steps.params.outputs.ticker }}"
            MODEL="${{ steps.params.outputs.model }}"
            git commit -m "chore: auto-generate ${TICKER} stock-eval ${DATE} [Gemini/${MODEL}]"
            echo "📤 Pushing report..."
            git push
            echo "✅ Report committed and pushed."
          fi
